<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HBCR Editor</title>
  <link rel="icon" type="image/png" href="/assets/ui/hbcr-icon.png"/>
  <link rel="stylesheet" href="/src/ui.css"/>
  <meta http-equiv="refresh" content="0; url=/editor/cms/" />
</head>
<body>
  <div class="app-root" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div class="screen" style="max-width:860px">
      <div class="h1">HBCR Editor</div>
      <div class="p" style="opacity:.85">Redirecting to <b>Content Editor (Easy Mode)</b>…</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
        <a class="btn" href="/editor/cms/">Open Content Editor (Easy Mode)</a>
        <a class="btn" href="/editor/builder/" style="opacity:.9">Open Builder (Design Mode)</a>
        <a class="btn" href="/editor/logout" style="opacity:.85">Logout</a>
      </div>
      <div class="p" style="margin-top:16px;opacity:.75">
        Easy Mode is designed for non-coders. Design Mode is the full builder UI.
      </div>
    </div>
  </div>
  <script>
    // In case meta refresh is blocked.
    try{ if(location.pathname === '/editor/' || location.pathname === '/editor/index.html'){ location.replace('/editor/cms/'); } }catch(e){}
  </script>
</body>
</html>
