<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HBCR Content Editor · Easy Mode</title>
  <link rel="icon" type="image/png" href="/assets/ui/hbcr-icon.png"/>
  <link rel="stylesheet" href="/src/ui.css"/>
  <link rel="stylesheet" href="/editor/cms/cms.css"/>
</head>
<body>
  <div class="cms-stage">
    <!-- Full-screen Builder Preview (the real builder) -->
    <iframe id="builderFrame" class="cms-builder" src="/editor/builder/?embed=1" title="HBCR Builder"></iframe>

    <!-- Popout Editor Drawer (Easy Mode) -->
    <div class="cms-drawer is-open" id="drawer">
      <header class="cms-topbar">
        <div class="cms-topbar-left">
          <img class="cms-logo" src="/assets/ui/hbcr-icon.png" alt="HBCR" />
          <div>
            <div class="cms-title">Content Editor <span class="cms-pill">Easy Mode</span></div>          </div>
        </div>
        <div class="cms-topbar-right">
          <button class="btn btn-small" id="btnToggleDrawer" type="button" title="Hide/Show editor menu">Hide</button>
          <button class="btn btn-small" id="btnResetLocal" type="button" title="Clears local preview/draft cache so you don't see ghost rows">Reset Local Drafts</button>
          <a class="btn btn-small" href="/editor/builder/">Open Builder (Design Mode)</a>
          <a class="btn btn-small" href="/">Back</a>
        </div>
      </header>

      <div class="cms-drawer-body">
        <div class="cms-tabs">
          <button class="cms-tab is-active" id="tabLibrary" type="button">Library</button>
          <button class="cms-tab" id="tabEditor" type="button">Editor</button>
        </div>

        <div class="cms-tabpanes">
          <section class="cms-panel" id="cmsLibrary">
            <div class="cms-panel-header">
              <div class="cms-h">Library</div>
              
            </div>
            
            <div class="cms-controls">
              <div class="cms-quick">
                <button class="btn" id="btnQuickAddRace">+ Add Race</button>
                <button class="btn" id="btnQuickAddSubrace">+ Add Subrace</button>
                <button class="btn" id="btnQuickAddClass">+ Add Class</button>
                <button class="btn" id="btnQuickAddSubclass">+ Add Subclass</button>
              </div>

              <label class="cms-label" style="margin-top:10px">Browse</label>
              <select class="cms-select" id="selType"></select>

              <label class="cms-label">Search</label>
              <input class="cms-input" id="inpSearch" placeholder="Search name or ID…" />

              <div class="cms-row" style="margin-top:10px;gap:10px">
                <button class="btn btn-small" id="btnReload" type="button">Reload</button>
              </div>

              <div class="cms-help" id="cmsStatus">Loading bundle…</div>
            </div>

            <div class="cms-list" id="listItems"></div>
          </section>

          <section class="cms-panel is-hidden" id="cmsEditor">
            <div class="cms-panel-header">
              <div>
                <div class="cms-h">Editor</div>
                <div class="cms-help" id="crumb">Select an item from the Library.</div>
              </div>
              <div class="cms-actions">
                <button class="btn btn-small" id="btnCopyRow">Copy TSV Row</button>
                <button class="btn btn-small" id="btnCopyHeaderRow">Copy TSV Header + Row</button>
                <button class="btn btn-small" id="btnUpdatePreview" title="Applies this item to the Builder preview behind the menu">Update Preview</button>
                <button class="btn btn-small" id="btnClearPreview" title="Removes this item from the local Builder preview">Clear Preview</button>
                <button class="btn btn-small" id="btnRefreshBuilder">Refresh Builder</button>
              </div>
            </div>

            <div class="cms-form" id="form">
              <div class="cms-empty">No item selected.</div>
            </div>
          </section>
        </div>
      </div>
    </div>

    
    <!-- Add New Modal -->
    <div class="cms-modal is-hidden" id="addModal" aria-hidden="true">
      <div class="cms-modal-backdrop" id="addModalBackdrop"></div>
      <div class="cms-modal-panel" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
        <div class="cms-modal-header">
          <div class="cms-modal-title" id="addModalTitle">Add New</div>
          <button class="btn btn-small" id="addModalClose" type="button">Close</button>
        </div>

        <div class="cms-modal-body">
          <div class="cms-help" id="addModalHelp">Create a new item for the current type.</div>

          <div class="cms-field is-hidden" id="addParentRow">
            <label class="cms-label" id="addParentLabel">Parent</label>
            <select class="cms-input" id="addParentSelect"></select>
          </div>

          <div class="cms-field">
            <label class="cms-label">ID</label>
            <input class="cms-input" id="addId" placeholder="unique id..." />
          </div>

          <div class="cms-field">
            <label class="cms-label">Name</label>
            <input class="cms-input" id="addName" placeholder="display name..." />
          </div>
        </div>

        <div class="cms-modal-actions">
          <button class="btn" id="addModalCreate" type="button">Create</button>
          <button class="btn" id="addModalCancel" type="button">Cancel</button>
        </div>
      </div>
    </div>



    <!-- Simple Modal -->
    <div class="cms-modal is-hidden" id="modal">
      <div class="cms-modal-backdrop" id="modalBackdrop"></div>
      <div class="cms-modal-card">
        <div class="cms-modal-title" id="modalTitle">Add</div>
        <div class="cms-modal-body" id="modalBody"></div>
        <div class="cms-modal-actions">
          <button class="btn btn-small" id="modalCancel" type="button">Cancel</button>
          <button class="btn btn-small" id="modalOk" type="button">Create</button>
        </div>
      </div>
    </div>

<!-- Small handle shown when drawer is hidden -->
    <button class="cms-handle is-hidden" id="drawerHandle" type="button">Editor Menu</button>
  </div>

  <script src="/editor/cms/cms.js"></script>
</body>
</html>
