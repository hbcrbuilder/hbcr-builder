<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HBCR Content Manager</title>
  <link rel="icon" type="image/png" href="/assets/ui/hbcr-icon.png"/>
  <link rel="stylesheet" href="/src/ui.css"/>
  <link rel="stylesheet" href="/editor/cms/cms.css"/>
</head>
<body>
  <div class="stage">
    <!-- Real Builder behind the editor -->
    <iframe id="builderFrame" class="builder" src="/editor/builder/?embed=1&cmsPreview=1" title="HBCR Builder"></iframe>

    <!-- Editor panel -->
    <div class="panel">
      <header class="topbar">
        <div class="brand">
          <img src="/assets/ui/hbcr-icon.png" alt="HBCR" />
          <div>
            <div class="title">Content Manager</div>
            <div class="sub">Non-technical workflow · Export TSV for Google Sheets</div>
          </div>
        </div>
        <div class="top-actions">
          <label class="toggle"><input id="togPreview" type="checkbox" /> Live preview</label>
          <button class="btn btn-small" id="btnRefreshBuilder" type="button">Refresh Preview</button>
          <button class="btn btn-small" id="btnReset" type="button" title="Clears local changes + preview overlay">Reset Local</button>
          <a class="btn btn-small" href="/">Back</a>
        </div>
      </header>

      <div class="body">
        <!-- Main view -->
        <div id="mainView">
          <div class="typebar">
            <button class="typebtn is-active" id="btnType_Races" type="button">Races</button>
            <button class="typebtn" id="btnType_Subraces" type="button">Subraces</button>
            <button class="typebtn" id="btnType_Classes" type="button">Classes</button>
            <button class="typebtn" id="btnType_Subclasses" type="button">Subclasses</button>
            <div class="spacer"></div>
            <button class="btn" id="btnExport" type="button">Export Changes</button>
          </div>

          <div class="split">
            <!-- List -->
            <section class="card list">
              <div class="cardhead">
                <div>
                  <div class="h" id="panelTitle">Races</div>
                  <div class="muted" id="count">0 items</div>
                </div>
                <div class="row">
                  <input class="input" id="search" placeholder="Search…" />
                  <button class="btn btn-small" id="btnReload" type="button">Reload</button>
                  <button class="btn" id="btnAdd" type="button">+ Add</button>
                </div>
              </div>

              <div class="tablewrap">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Parent</th>
                      <th>ID</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>
              <div class="status" id="status">Loading…</div>
            </section>

            <!-- Form -->
            <section class="card form">
              <div class="cardhead">
                <div>
                  <div class="h" id="formTitle">Add</div>
                  <div class="muted" id="formHelp"></div>
                </div>
                <div class="row">
                  <button class="btn btn-small" id="btnDelete" type="button" title="Marks this ID as deleted for export">Delete</button>
                  <button class="btn" id="btnSave" type="button">Save</button>
                </div>
              </div>
              <div id="form" class="formbody">
                <div class="empty">Click <b>+ Add</b> or <b>Edit</b> to start.</div>
              </div>
            </section>
          </div>
        </div>

        <!-- Export view -->
        <div id="exportView" class="is-hidden">
          <div class="exportbar">
            <button class="btn" id="btnBack" type="button">← Back</button>
            <div class="h">Export Changes (TSV)</div>
            <div class="muted">Copy each block and paste into the matching Google Sheet.</div>
          </div>
          <div id="exportOut" class="exportout"></div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script src="/editor/cms/cms.js"></script>
</body>
</html>
